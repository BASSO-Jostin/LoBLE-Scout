# Available runners configured by board.cmake.
runners:
- jlink

# Default flash runner if --runner is not given.
flash-runner: jlink

# Default debug runner if --runner is not given.
debug-runner: jlink

# Common runner configuration values.
config:
  board_dir: D:/Git/zephyrprojet/v3.7/zephyr/boards/rak/rak11720
  # Build outputs:
  elf_file: zephyr.elf
  bin_file: zephyr.bin
  # Host tools:
  gdb: D:/Documents/M2/RTOS/zephyr-sdk-0.17.4/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb.exe

# Runner specific arguments
args:
  jlink:
    - --dt-flash=y
    - --device=AMA3B1KK-KBR
    - --iface=swd
    - --speed=1000
