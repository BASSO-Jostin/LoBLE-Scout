# Configuration minimale pour blink
CONFIG_GPIO=y
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_RING_BUFFER=y #Buffer pour le BLE

CONFIG_CBPRINTF_FP_SUPPORT=y #Pour autorier le float
CONFIG_CBPRINTF_COMPLETE=y


# Si vous utilisez des LEDs


# Si vous utilisez UART pour les logs
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Active la gestion de l'énergie
#CONFIG_PM=y


# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="RAK11720_BLE"
CONFIG_BT_DEVICE_APPEARANCE=128

# GATT
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_MAX_CONN=1


# Security / Pairing
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y

# Just Works (sans PIN)
CONFIG_BT_SMP_SC_ONLY=n
CONFIG_BT_FIXED_PASSKEY=n




